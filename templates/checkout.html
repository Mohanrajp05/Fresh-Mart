{% extends "base.html" %}

{% block title %}Checkout{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-md-8">
            <div class="card mb-4">
                <div class="card-body">
                    <h3 class="card-title mb-4">Shipping Information</h3>
                    <form id="checkout-form" method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="address" class="form-label">Delivery Address</label>
                            <textarea class="form-control" id="address" name="address" rows="3" required></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="city" class="form-label">City</label>
                                <input type="text" class="form-control" id="city" name="city" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="state" class="form-label">State</label>
                                <input type="text" class="form-control" id="state" name="state" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="pincode" class="form-label">PIN Code</label>
                                <input type="text" class="form-control" id="pincode" name="pincode" pattern="[0-9]{6}" maxlength="6" required>
                                <small class="text-muted">Enter 6-digit PIN code</small>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="phone" class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" id="phone" name="phone" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                        </div>

                        <h3 class="mt-4 mb-3">Payment Method</h3>
                        <div class="payment-methods">
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="radio" name="payment_method" id="cod" value="cod" checked>
                                <label class="form-check-label" for="cod">
                                    <i class="bi bi-cash-coin text-success me-2"></i>Cash on Delivery (COD)
                                </label>
                                <small class="text-muted d-block ms-4">Pay with cash upon delivery</small>
                            </div>
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="radio" name="payment_method" id="card" value="card">
                                <label class="form-check-label" for="card">
                                    <i class="bi bi-credit-card me-2"></i>Credit/Debit Card
                                </label>
                                <small class="text-muted d-block ms-4">Pay securely with your card</small>
                            </div>
                        </div>

                        <div id="card-payment-section" class="card-payment mt-3" style="display: none;">
                            <div class="mb-3">
                                <label for="card-number" class="form-label">Card Number</label>
                                <input type="text" class="form-control" id="card-number" placeholder="1234 5678 9012 3456">
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="expiry" class="form-label">Expiry Date</label>
                                    <input type="text" class="form-control" id="expiry" placeholder="MM/YY">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="city" class="form-label">CVV</label>
                                    <input type="text" class="form-control" city="placeholder="123">
                                    

                                </div>
                            </div>
                        </div>

                        <!-- Hidden input for cart items -->
                        <input type="hidden" id="cart-items-json" name="cart_items">
                        <input type="hidden" id="subtotal" name="subtotal">
                        <input type="hidden" id="total" name="total">

                        <button type="submit" class="btn btn-primary w-100 mt-4">
                            Place Order
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h3 class="card-title mb-4">Order Summary</h3>
                    <div id="cart-summary">
                        <!-- Cart summary will be populated by JavaScript -->
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Subtotal:</span>
                        <span id="subtotal-display">₹0</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Delivery Fee:</span>
                        <span id="delivery-fee">₹0</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2 fw-bold">
                        <span>Total:</span>
                        <span id="total-display">₹0</span>
                    </div>
                    <input type="hidden" id="base-delivery-fee" value="{{ delivery_settings.delivery_fee }}">
                    <input type="hidden" id="free-delivery-threshold" value="{{ delivery_settings.free_delivery_threshold }}">
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Toggle card payment section based on payment method selection
    const paymentMethods = document.getElementsByName('payment_method');
    const cardPaymentSection = document.getElementById('card-payment-section');

    paymentMethods.forEach(method => {
        method.addEventListener('change', function() {
            if (this.value === 'card') {
                cardPaymentSection.style.display = 'block';
            } else {
                cardPaymentSection.style.display = 'none';
            }
        });
    });

    const cartSummary = document.getElementById('cart-summary');
    const subtotalElement = document.getElementById('subtotal-display');
    const deliveryFeeElement = document.getElementById('delivery-fee');
    const totalElement = document.getElementById('total-display');
    const cartItemsInput = document.getElementById('cart-items-json');
    const subtotalInput = document.getElementById('subtotal');
    const totalInput = document.getElementById('total');
    const baseDeliveryFee = Number(document.getElementById('base-delivery-fee')?.value || 0);
    const freeDeliveryThreshold = Number(document.getElementById('free-delivery-threshold')?.value || 0);

    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let stockById = {};

    function showCheckoutToast(message, type = 'warning') {
        const toast = document.createElement('div');
        toast.className = `alert alert-${type} position-fixed bottom-0 end-0 m-3`;
        toast.style.zIndex = '1050';
        toast.innerHTML = `
            <div class="d-flex align-items-center">
                <span>${message}</span>
                <button type="button" class="btn-close ms-3" data-bs-dismiss="alert"></button>
            </div>
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function persistCart() {
        localStorage.setItem('cart', JSON.stringify(cart));
    }

    function getSubtotal() {
        return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    }

    function getDeliveryFeeForSubtotal(subtotal) {
        return subtotal >= freeDeliveryThreshold ? 0 : baseDeliveryFee;
    }

    function syncHiddenFields() {
        const subtotal = getSubtotal();
        const deliveryFee = getDeliveryFeeForSubtotal(subtotal);
        cartItemsInput.value = JSON.stringify(cart);
        subtotalInput.value = subtotal;
        totalInput.value = subtotal + deliveryFee;
    }

    function renderOrderSummary() {
        const summaryHTML = cart.map(item => {
            const itemTotal = item.price * item.quantity;
            const availableStock = stockById[item.id];
            const plusDisabled = typeof availableStock === 'number' && item.quantity >= availableStock;

            return `
                <div class="mb-3 pb-2 border-bottom">
                    <div class="d-flex justify-content-between align-items-start">
                        <div class="me-2">
                            <span class="fw-bold">${item.name}</span>
                            <small class="text-muted d-block">Quantity: ${item.quantity}</small>
                            ${typeof availableStock === 'number' ? `<small class="text-muted d-block">Available: ${availableStock}</small>` : ''}
                        </div>
                        <span>₹${itemTotal}</span>
                    </div>
                    <div class="mt-2 d-flex align-items-center gap-2">
                        <button type="button" class="btn btn-outline-secondary btn-sm quantity-btn" data-action="decrease" data-id="${item.id}">-</button>
                        <span>${item.quantity}</span>
                        <button type="button" class="btn btn-outline-secondary btn-sm quantity-btn" data-action="increase" data-id="${item.id}" ${plusDisabled ? 'disabled title="Maximum available stock reached"' : ''}>+</button>
                    </div>
                </div>
            `;
        }).join('');

        cartSummary.innerHTML = summaryHTML || '<div class="alert alert-info">Your cart is empty</div>';

        const subtotal = getSubtotal();
        const deliveryFee = getDeliveryFeeForSubtotal(subtotal);
        subtotalElement.textContent = `₹${subtotal}`;
        deliveryFeeElement.textContent = deliveryFee === 0 ? 'FREE' : `₹${deliveryFee}`;
        totalElement.textContent = `₹${subtotal + deliveryFee}`;

        syncHiddenFields();
    }

    function updateItemQuantity(productId, action) {
        const itemIndex = cart.findIndex(item => item.id === productId);
        if (itemIndex === -1) return;

        const item = cart[itemIndex];
        const availableStock = stockById[item.id];

        if (action === 'increase') {
            if (typeof availableStock === 'number' && item.quantity >= availableStock) {
                showCheckoutToast(`${item.name} has only ${availableStock} item(s) left.`, 'warning');
                return;
            }
            item.quantity += 1;
        }

        if (action === 'decrease') {
            item.quantity -= 1;
            if (item.quantity <= 0) {
                cart.splice(itemIndex, 1);
            }
        }

        persistCart();
        renderOrderSummary();
    }

    cartSummary.addEventListener('click', function(event) {
        const btn = event.target.closest('.quantity-btn');
        if (!btn) return;

        updateItemQuantity(btn.dataset.id, btn.dataset.action);
    });

    function loadCurrentStock() {
        return fetch('/api/products')
            .then(response => response.json())
            .then(products => {
                stockById = {};
                products.forEach(product => {
                    stockById[product.id] = parseInt(product.stock || 0, 10);
                });
            })
            .catch(error => {
                console.error('Error loading stock data:', error);
                stockById = {};
            });
    }

    loadCurrentStock().finally(renderOrderSummary);
    
    // Handle form submission
    const checkoutForm = document.getElementById('checkout-form');
    checkoutForm.addEventListener('submit', function(e) {
        if (cart.length === 0) {
            e.preventDefault();
            alert('Your cart is empty. Please add items to your cart before checking out.');
            return;
        }

        // Final guard before submit if stock data is available in client.
        for (const item of cart) {
            const availableStock = stockById[item.id];
            if (typeof availableStock === 'number' && item.quantity > availableStock) {
                e.preventDefault();
                showCheckoutToast(`${item.name} has only ${availableStock} item(s) left. Please reduce quantity.`, 'danger');
                return;
            }
        }

        syncHiddenFields();
    });
});
</script>
{% endblock %}
