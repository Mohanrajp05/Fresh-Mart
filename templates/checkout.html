{% extends "base.html" %}

{% block title %}Checkout{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <div class="card payment-form">
            <div class="card-body">
                <h2 class="card-title mb-4">Payment Information</h2>
                <form class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label for="cardName" class="form-label">Name on Card</label>
                        <input type="text" class="form-control" id="cardName" required>
                        <div class="invalid-feedback">
                            Please enter the name on your card.
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="cardNumber" class="form-label">Card Number</label>
                        <input type="text" class="form-control" id="cardNumber" required pattern="[0-9]{16}">
                        <div class="invalid-feedback">
                            Please enter a valid 16-digit card number.
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="expiry" class="form-label">Expiry Date</label>
                            <input type="text" class="form-control" id="expiry" placeholder="MM/YY" required pattern="(0[1-9]|1[0-2])\/([0-9]{2})">
                            <div class="invalid-feedback">
                                Please enter a valid expiry date.
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="cvv" class="form-label">CVV</label>
                            <input type="text" class="form-control" id="cvv" required pattern="[0-9]{3,4}">
                            <div class="invalid-feedback">
                                Please enter a valid CVV.
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <h3>Order Summary</h3>
                        <div id="cart-items" class="mb-3">
                            <!-- Cart items will be populated by JavaScript -->
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="h5">Total:</span>
                            <span class="h5" id="cart-total">$0.00</span>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Complete Purchase</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
