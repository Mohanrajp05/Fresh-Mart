{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="input-group">
                <input type="text" class="form-control" id="search-input" placeholder="Search products...">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
            </div>
        </div>
        <div class="col-md-6">
            <div class="btn-group float-end">
                <button class="btn btn-outline-secondary category-filter active" data-category="all">ALL</button>
                <button class="btn btn-outline-secondary category-filter" data-category="vegetables">VEGETABLES</button>
                <button class="btn btn-outline-secondary category-filter" data-category="fruits">FRUITS</button>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <!-- Product cards will be dynamically generated -->
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Initialize cart if not already initialized
    if (typeof cart === 'undefined') {
        console.error('Cart not initialized. Loading cart.js...');
        const script = document.createElement('script');
        script.src = "{{ url_for('static', filename='js/cart.js') }}";
        document.body.appendChild(script);
    }
});
</script>
{% endblock %}
